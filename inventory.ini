# =============================================================================
# Inventory for Insights Compliance Playbook
# =============================================================================
# Organize your RHEL 9 systems into groups as needed.
# This inventory supports both static and dynamic inventory patterns.

[rhel9]
# Add your RHEL 9 systems here
# rhel9-server01.example.com
# rhel9-server02.example.com
# 192.168.1.100

[rhel9:vars]
# Group-specific variables (override in group_vars/ for production)
ansible_user=ansible
ansible_become=true
ansible_become_method=sudo

# Insights environment tag (used for filtering in console.redhat.com)
insights_environment=production

# =============================================================================
# Environment-based grouping example
# =============================================================================
[production:children]
rhel9

[development]
# dev-rhel9-01.example.com insights_environment=development

[staging]
# staging-rhel9-01.example.com insights_environment=staging

# =============================================================================
# Compliance-based grouping example
# =============================================================================
[cis_level1:children]
rhel9

[cis_level2]
# Systems requiring CIS Level 2 compliance
