  # Source: Red Hat Automation Hub (certified) or Ansible Galaxy
  - name: redhat.rhel_system_roles
    version: ">=1.23.0"

  # Red Hat Insights Collection (includes compliance role)
  # Source: Red Hat Automation Hub (certified) or Ansible Galaxy
  - name: redhat.insights
    version: ">=1.3.0"
