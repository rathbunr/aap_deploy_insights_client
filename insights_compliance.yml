---
# =============================================================================
# Red Hat Insights: Registration, Compliance & Malware Detection
# =============================================================================
# This playbook uses ONLY official Red Hat supported roles and collections:
#   - redhat.rhel_system_roles.rhc   (RHSM + Insights registration)
#   - redhat.insights.compliance     (OpenSCAP compliance scanning)
#
# Malware detection uses the official insights-client collector interface.
# =============================================================================

- name: Configure RHEL 9 systems for Insights Compliance & Malware Detection
  hosts: rhel9
  become: true
  gather_facts: true

  vars:
    # =========================================================================
    # RHSM & Insights Registration (rhc role)
    # =========================================================================
    # Store secrets in Ansible Vault - see vault.yml.example
    rhc_organization: "{{ vault_rhc_organization }}"
    rhc_auth:
      activation_keys:
        keys:
          - "{{ vault_activation_key }}"

    # Insights configuration
    rhc_insights:
      state: present
      autoupdate: true
      remediation: present
      tags:
        environment: "{{ insights_environment | default('production') }}"
        compliance: "cis-level1"

    # =========================================================================
    # Compliance Configuration
    # =========================================================================
    # Policy must be created in console.redhat.com BEFORE running this playbook
    # Navigate to: Security > Compliance > SCAP Policies > Create new policy
    # Select: CIS Red Hat Enterprise Linux 9 Benchmark for Level 1 - Server
    compliance_policy_id: "{{ vault_compliance_policy_id | default(omit) }}"

    # =========================================================================
    # Malware Detection Configuration
    # =========================================================================
    malware_detection_enabled: true
    malware_scan_on_playbook_run: true
    malware_schedule_enabled: true
    malware_schedule_weekday: "0"      # Sunday (0-6, 0=Sunday)
    malware_schedule_hour: "2"
    malware_schedule_minute: "30"

  pre_tasks:
    - name: Validate target is RHEL 9
      ansible.builtin.assert:
        that:
          - ansible_distribution == "RedHat"
          - ansible_distribution_major_version | int == 9
        fail_msg: "This playbook is designed for RHEL 9 systems only"
        success_msg: "Target validated as RHEL {{ ansible_distribution_version }}"
      tags: [always]

  tasks:
    # =========================================================================
    # Phase 1: System Registration (Official rhc System Role)
    # =========================================================================
    - name: Register system with RHSM and connect to Insights
      ansible.builtin.import_role:
        name: redhat.rhel_system_roles.rhc
      vars:
        rhc_state: present
      tags: [registration, rhc]

    # =========================================================================
    # Phase 2: Compliance Scanning (Official redhat.insights.compliance Role)
    # =========================================================================
    # This role handles:
    #   - Installing scap-security-guide package
    #   - Installing openscap-scanner
    #   - Running compliance scan
    #   - Uploading results to Insights
    - name: Install and run Insights Compliance scan
      ansible.builtin.import_role:
        name: redhat.insights.compliance
      tags: [compliance, openscap]

    # =========================================================================
    # Phase 3: Assign Compliance Policy (if policy ID provided)
    # =========================================================================
    - name: Assign system to compliance policy
      when:
        - compliance_policy_id is defined
        - compliance_policy_id | length > 0
      tags: [compliance, policy]
      block:
        - name: Check current policy assignments
          ansible.builtin.command:
            cmd: insights-client --compliance-policies
          register: current_policies
          changed_when: false
          failed_when: false

        - name: Assign system to CIS Level 1 compliance policy
          ansible.builtin.command:
            cmd: "insights-client --compliance-assign {{ compliance_policy_id }}"
          register: policy_assign
          changed_when: "'assigned' in policy_assign.stdout and 'already' not in policy_assign.stdout"
          failed_when:
            - policy_assign.rc != 0
            - "'already assigned' not in (policy_assign.stdout | default(''))"

    # =========================================================================
    # Phase 4: Malware Detection Setup
    # =========================================================================
    - name: Configure Malware Detection
      when: malware_detection_enabled | bool
      tags: [malware]
      block:
        - name: Install YARA (required for malware detection)
          ansible.builtin.package:
            name: yara
            state: present

        - name: Run initial malware detection scan
          ansible.builtin.command:
            cmd: insights-client --collector malware-detection
          register: malware_scan
          changed_when: true
          when: malware_scan_on_playbook_run | bool

        - name: Configure scheduled malware detection scans
          ansible.builtin.cron:
            name: "Insights Malware Detection Scan"
            user: root
            weekday: "{{ malware_schedule_weekday }}"
            hour: "{{ malware_schedule_hour }}"
            minute: "{{ malware_schedule_minute }}"
            job: >-
              /usr/bin/insights-client --collector malware-detection
              >> /var/log/insights-malware-detection.log 2>&1
            state: "{{ 'present' if malware_schedule_enabled else 'absent' }}"

        - name: Configure logrotate for malware detection logs
          ansible.builtin.copy:
            dest: /etc/logrotate.d/insights-malware
            content: |
              /var/log/insights-malware-detection.log {
                  weekly
                  rotate 4
                  compress
                  missingok
                  notifempty
                  create 0640 root root
              }
            owner: root
            group: root
            mode: '0644'
          when: malware_schedule_enabled | bool

    # =========================================================================
    # Phase 5: Verification
    # =========================================================================
    - name: Verify Insights registration and services
      tags: [verify]
      block:
        - name: Check Insights client status
          ansible.builtin.command:
            cmd: insights-client --status
          register: insights_status
          changed_when: false

        - name: Display Insights status
          ansible.builtin.debug:
            msg: "{{ insights_status.stdout_lines }}"

        - name: Test Insights connectivity
          ansible.builtin.command:
            cmd: insights-client --test-connection
          register: insights_connection
          changed_when: false
          failed_when: insights_connection.rc != 0

  handlers:
    - name: Refresh Insights data
      ansible.builtin.command:
        cmd: insights-client
      listen: "refresh insights"
