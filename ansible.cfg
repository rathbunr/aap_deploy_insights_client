[defaults]
# Project-level ansible.cfg for infra-insights-compliance
# In AAP 2.6, most of these are overridden by the platform settings.
# This file is primarily for local development/testing.

inventory = inventory/insights.yml
roles_path = roles
collections_path = collections
remote_user = ansible_svc
timeout = 60

# Callback plugins for better output
stdout_callback = yaml
callback_whitelist = profile_tasks

# Fact caching (useful for large inventories)
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/.ansible_facts_cache
fact_caching_timeout = 3600

[inventory]
# Enable the Insights inventory plugin
enable_plugins = redhat.insights.insights, auto, host_list, yaml, ini, toml

[privilege_escalation]
become = true
become_method = sudo
become_user = root
become_ask_pass = false
