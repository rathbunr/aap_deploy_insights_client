---
# collections/requirements.yml
# Install: ansible-galaxy collection install -r collections/requirements.yml
#
# For AAP 2.6: Add these to your execution environment definition or
# sync them into Private Automation Hub from console.redhat.com.

collections:
  - name: redhat.insights
    version: ">=1.3.1"

  # Optional: rhc system role for onboarding new hosts to Insights
  - name: redhat.rhel_system_roles
    version: ">=1.24.0"

  # Optional: Satellite integration for content view awareness
  - name: redhat.satellite
    version: ">=4.0.0"
